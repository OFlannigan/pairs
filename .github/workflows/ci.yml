name: CI
on:
  - push
  - pull_request
  - workflow_dispatch
jobs:
  test:
    name: Runs tests
    uses: ./.github/workflows/test.yml

  build:
    needs: test
    name: Build project
    uses: ./.github/workflows/build.yml

  ci:
    name: CI
    runs-on: ubuntu-latest
    needs: [test, build]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.test.result }}" != "success" || "${{ needs.build.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
